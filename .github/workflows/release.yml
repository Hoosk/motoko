name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o motoko_${{ matrix.os }}_${{ matrix.arch }} ./cmd/motoko

      - name: Package binary
        run: |
          tar -cvzf motoko_${{ matrix.os }}_${{ matrix.arch }}.tar.gz motoko_${{ matrix.os }}_${{ matrix.arch }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: motoko_${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          draft: false
          prerelease: contains(github.ref, 'alpha') || contains(github.ref, 'beta')
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
