name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags "-X main.Version=${{ github.ref_name }}" -o motoko ./cmd/motoko

      - name: Package binary
        run: |
          tar -cvzf motoko_${{ matrix.os }}_${{ matrix.arch }}.tar.gz motoko

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: motoko_${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          draft: false
          prerelease: contains(github.ref, 'alpha') || contains(github.ref, 'beta')
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
